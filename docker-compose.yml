services:
  # ── Backend: Laravel API ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskboard-backend
    ports:
      - "8000:8000"
    volumes:
      # Montar código para hot-reload durante desarrollo
      - .:/app
      # Evitar sobreescribir vendor del container
      - /app/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/app/database/database.sqlite
      - JWT_SECRET=J8iLOpJpbntvDYkUKyW3A0S510EYD1q9w1moMx0h6kqZBFeSb460V5J53PbhZfI9
    networks:
      - taskboard-net

  # ── Frontend: React (Vite) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskboard-frontend
    ports:
      - "5173:5173"
    volumes:
      # Montar código para hot-reload (HMR de Vite)
      - ./frontend:/app
      # Evitar sobreescribir node_modules del container
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - taskboard-net

networks:
  taskboard-net:
    driver: bridge
